{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Навигация{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/logosign.svg' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-background: #1C1C1C;
            --color-surface: #4d19cc;
            --color-text: #f1f1f1;
            --color-building: #676767;
            --color-emae: #676767;
            --color-highlight: #4d19cc;
        }

        body {
            font-family: 'Golos Text', sans-serif;
            background-color: var(--color-surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 20px;
            min-height: 100vh;

        }

        .room {
            position: absolute;
            border: 2px solid #c1c1c1;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            font-weight: bold;
            color: #c1c1c1;
            font-size: 16px;
            z-index: 100;
        }

        .room:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 16px rgba(83, 0, 214, 0.2);
            border: 2px solid var(--color-highlight);
            background: rgba(83, 0, 214, 0.3);
            z-index: 100;
        }

        .room.highlight {
            background: rgba(77, 25, 204, 0.5);
            border: 2px solid #4d19cc;
            box-shadow: 0 0 20px rgba(77,25,204,0.8);
        }

        .toilet {
            position: absolute;
            border: 2px solid #c1c1c1;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            font-weight: bold;
            color: #c1c1c1;
            font-size: 16px;
            z-index: 100;
        }

        .toilet:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 16px rgba(255, 255, 255, 0.2);
            border: 2px solid #FFFFFF;
            background: rgba(255, 255, 255, 0.2);
            z-index: 100;
        }

        .staircase {
            position: absolute;
            border: 2px solid #c1c1c1;
            display: flex;
            cursor: pointer;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            transition: all 0.3s ease;
            font-weight: bold;
            color: #c1c1c1;
            font-size: 16px;
            background: var(--color-emae);
            flex-direction: column;
            z-index: 10;
        }

        .staircase:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 16px rgba(83, 0, 214, 0.2);
            border: 2px solid var(--color-highlight);
            background: rgba(83, 0, 214, 0.3);
            z-index: 10;
        }

        .evacuation-header {
            text-align: center;
            margin-bottom: 24px;
            max-width: 1200px;
            width: 100%;
        }

        .evacuation-header h1 {
            color: var(--color-text);
            font-size: 32px;
            font-weight: 400;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #FFFFFF;
            font-size: 20px;
            display: inline-block;
            font-weight: 400;
        }

        .floorplan {
            position: relative;
            width: 90vw;
            height: 80vh;   /* ВАЖНО */
            background: #232323;
            border-radius: 16px;
            overflow: hidden;
            border: 4px solid #3a3a3a;
        }

        .floorplan-inner {
            position: relative;
            width: 1000px;   /* базовый размер схемы */
            height: 700px;
            transform: scale(1.2); /* 👈 увеличиваешь только схему */
            transform-origin: top left;
        }

        .header-logo {
            height: 50px;
            width: auto;
            vertical-align: middle;
        }

        .building {
            position: absolute;
            border: 0px solid #fff;
            display: flex;
            color: #c1c1c1;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        #searchInput {
            width: 100%;
            padding: 15px 20px;
            font-family: 'Golos Text', sans-serif;
            font-size: 18px;
            color: #e8e8e8;
            background-color: #696969;
            border-radius: 8px;
            border: 2px solid #2a1468;
            transition: all 0.3s ease;
            outline: none;
        }

        #searchInput:focus {
            background-color: #4f4f4f;
            border-color: #6a35e0;
        }

        #searchInput:hover {
            background-color: #4f4f4f;
            border-color: #6a35e0;
        }

        #searchInput::placeholder {
            color: #C1C1C1;
            font-family: 'Golos Text', sans-serif;
            font-size: 18px;
        }

        #searchInput:-webkit-autofill,
        #searchInput:-webkit-autofill:hover,
        #searchInput:-webkit-autofill:focus,
        #searchInput:-webkit-autofill:active {
            -webkit-text-fill-color: #ffffff !important;
            background-color: #4f4f4f !important;
            border: 2px solid #6a35e0 !important;
            font-family: 'Golos Text', sans-serif !important;
            font-size: 18px !important;
            font-weight: 400 !important;
            transition: background-color 5000s ease-in-out 0.3s;
        }

        #searchResults {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #2c2c2c;
            border-radius: 8px;
            overflow: hidden;
            z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            max-height: 240px;
            overflow-y: auto;
            margin-top: 4px;
        }

        #searchResults div {
            padding: 12px 15px;
            border-bottom: 1px solid #3d3d3d;
            cursor: pointer;
            color: #e0e0e0;
            transition: background 0.2s ease;
        }

        #searchResults div:hover {
            background: #3d3d3d;
            color: #ffffff;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

    <div class="evacuation-header">

        <h1> <img src="{% static 'images/logosign-white.svg' %}" class="header-logo"> Карта УУНиТ — Учебный {{ building }} </h1>
        <div class="subtitle">{{ current_floor }} этаж</div>
    </div>

    {% block content %}{% endblock %}


<script>
(function () {
    const params = new URLSearchParams(window.location.search);
    const room = params.get('room');

    if (!room) return;

    const el = document.querySelector(`[data-name="${room}"]`);

    if (el) {
        el.classList.add('highlight');

        // опционально — прокрутка к комнате
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
})();
</script>

</body>
</html>
