{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Навигация{% endblock %}</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-background: #1C1C1C;
            --color-surface: #4d19cc;
            --color-text: #f1f1f1;
            --color-building: #676767;
            --color-emae: #676767;
            --color-highlight: #4d19cc;
        }

        body {
            font-family: 'Golos Text', sans-serif;
            background-color: var(--color-surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 20px;
            min-height: 100vh;

        }

        .room {
            position: absolute;
            border: 2px solid #c1c1c1;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            font-weight: bold;
            color: #c1c1c1;
            font-size: 16px;
            z-index: 100;
        }

        .room:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 16px rgba(83, 0, 214, 0.2);
            border: 2px solid var(--color-highlight);
            background: rgba(83, 0, 214, 0.3);
            z-index: 100;
        }

        .room.highlight {
            background: rgba(77, 25, 204, 0.5);
            border: 2px solid #4d19cc;
            box-shadow: 0 0 20px rgba(77,25,204,0.8);
        }

        .toilet {
            position: absolute;
            border: 2px solid #c1c1c1;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            font-weight: bold;
            color: #c1c1c1;
            font-size: 16px;
            z-index: 100;
        }

        .toilet:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 16px rgba(255, 255, 255, 0.2);
            border: 2px solid #FFFFFF;
            background: rgba(255, 255, 255, 0.2);
            z-index: 100;
        }

        .staircase {
            position: absolute;
            border: 2px solid #c1c1c1;
            display: flex;
            cursor: pointer;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            transition: all 0.3s ease;
            font-weight: bold;
            color: #c1c1c1;
            font-size: 16px;
            background: var(--color-emae);
            flex-direction: column;
            z-index: 10;
        }

        .staircase:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 16px rgba(83, 0, 214, 0.2);
            border: 2px solid var(--color-highlight);
            background: rgba(83, 0, 214, 0.3);
            z-index: 10;
        }

        .evacuation-header {
            text-align: center;
            margin-bottom: 24px;
            max-width: 1200px;
            width: 100%;
        }

        .evacuation-header h1 {
            color: var(--color-text);
            font-size: 32px;
            font-weight: 400;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #ddd;
            font-size: 18px;
            border-bottom: 2px solid var(--color-highlight);
            display: inline-block;
            padding-bottom: 8px;
        }

        .floorplan {
            position: relative;
            width: 90vw;
            height: 80vh;   /* ВАЖНО */
            background: #232323;
            border-radius: 16px;
            overflow: hidden;
            border: 4px solid #3a3a3a;
        }

        .floorplan-inner {
            position: relative;
            width: 1000px;   /* базовый размер схемы */
            height: 700px;
            transform: scale(1.2); /* 👈 увеличиваешь только схему */
            transform-origin: top left;
        }

        .header-logo {
            height: 50px;
            width: auto;
            vertical-align: middle;
        }

        .building {
            position: absolute;
            border: 0px solid #fff;
            display: flex;
            color: #c1c1c1;
        }

    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

    <div class="evacuation-header">

        <h1> <img src="{% static 'images/logosign-white.svg' %}" class="header-logo"> Карта УУНиТ — Учебный {{ building }} </h1>
        <div class="subtitle">{{ current_floor }} этаж</div>
    </div>

    {% block content %}{% endblock %}


<script>
(function () {
    const params = new URLSearchParams(window.location.search);
    const room = params.get('room');

    if (!room) return;

    const el = document.querySelector(`[data-name="${room}"]`);

    if (el) {
        el.classList.add('highlight');

        // опционально — прокрутка к комнате
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
})();
</script>

</body>
</html>
