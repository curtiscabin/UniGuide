{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/logosign.svg' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Golos Text', sans-serif;
            background-color: #4d19cc;
            color: #f1f1f1;
            min-height: 100vh;
        }

        .header {
            padding: 20px;
            text-align: center;
            font-size: 30px;
            font-weight: 400;
            background: rgba(0, 0, 0, 0.2);
        }

        .header-logo {
            height: 50px;
            width: auto;
            vertical-align: middle;
        }

        .search-container {
            padding: 20px;
            text-align: center;
        }

        .search-box {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            color: #e8e8e8;
        }

        #searchInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            font-family: 'Golos Text', sans-serif;
            color: #e8e8e8; /* цвет текста */
            background-color: #696969; /* цвет фона */
            border-radius: 8px;
            border: 2px solid #2a1468;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            font-family: 'Golos Text', sans-serif;
            background-color: #4f4f4f;
            border-color: #6a35e0;
            outline: none;
        }

        #searchInput:hover {
            font-family: 'Golos Text', sans-serif;
            background-color: #4f4f4f;
            border-color: #6a35e0;
        }

        #searchInput::placeholder {
            font-family: 'Golos Text', sans-serif;
            color: #C1C1C1;
        }

        #searchInput:-webkit-autofill,
        #searchInput:-webkit-autofill:hover,
        #searchInput:-webkit-autofill:focus,
        #searchInput:-webkit-autofill:active {
            -webkit-text-fill-color: #ffffff !important;
            background-color: #2c2c2c !important;
            border: 2px solid #6a35e0 !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .campus-map {
            position: relative;
            width: 90%;
            max-width: 1400px;
            height: 700px;
            margin: 20px auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .building-link {
            position: absolute;
            text-decoration: none;
        }

        .building {
            position: absolute;
            align-items: center;
            justify-content: center;
            background: #696969;
            color: #c1c1c1;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .building:hover {
            transform: scale(1.01);
            background: rgba(77, 25, 204, 0.2);
            border: 3px solid #4d19cc;
            z-index: 10;
        }

        .building.highlighted {
            border: 4px solid #4d19cc;
            background: rgba(77, 25, 204, 0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%,100% { box-shadow: 0 0 15px rgba(77,25,204,0.6); }
            50% { box-shadow: 0 0 30px rgba(77,25,204,1); }
        }

        .building-text {
            position: absolute;
            color: #c1c1c1;
            user-select: none;
        }
    </style>
</head>

<body>

<div class="header">
    <img src="{% static 'images/logosign-white.svg' %}" class="header-logo"> {{ page_title }}
</div>

<div class="search-container">
    <div class="search-box">
        <input id="searchInput" type="text" placeholder="Введите номер корпуса">

        <div id="searchResults" style="
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: #222;
        border-radius: 8px;
        overflow: hidden;
        z-index: 1000;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        max-height: 240px;
        overflow-y: auto;
        "></div>

    </div>
</div>

<div class="campus-map">

{% for building in buildings %}
<a href="{% url 'building' building.number %}"
   class="building-link"
   data-building="{{ building.number }}"
   style="
        left: {{ building.position_left }};
        top: {{ building.position_top }};
        width: {{ building.width }};
        height: {{ building.height }};
   "
>
    <div class="building"
         style="
            width: 100%;
            height: 100%;
            {% if building.clip_path %}clip-path: {{ building.clip_path }};{% endif %}
            {% if building.border_radius %}border-radius: {{ building.border_radius }};{% endif %}
            {% if building.z_index %}z-index: {{ building.z_index }};{% endif %}
         "
    >
        <div class="building-text"
             style="
                {% if building.text_padding_top %}top: {{ building.text_padding_top }};{% endif %}
                {% if building.text_padding_left %}left: {{ building.text_padding_left }};{% endif %}
             "
        >
            {{ building.number }}
        </div>
    </div>
</a>
{% endfor %}

</div>

<script>
const input = document.getElementById('searchInput');
const resultsBox = document.getElementById('searchResults');

input.addEventListener('input', async function() {
    const query = this.value.trim();

    if (!query) {
        resultsBox.innerHTML = '';
        return;
    }

    const response = await fetch(`/search/?q=${query}`);
    const data = await response.json();

    resultsBox.innerHTML = '';

    data.results.forEach(item => {
        const div = document.createElement('div');

        div.style.padding = '10px';
        div.style.borderBottom = '1px solid #444';
        div.style.cursor = 'pointer';

        div.innerHTML = `
            ${item.name} — корпус ${item.building}, этаж ${item.floor}
        `;

        div.onclick = () => {
            window.location.href = `/building/${item.building}/?floor=${item.floor}&room=${item.name}`;
        };

        resultsBox.appendChild(div);
    });
});
</script>

</body>
</html>
