<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #4d19cc;
            color: #f1f1f1;
            min-height: 100vh;
        }

        .header {
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 2px solid #4d19cc;
        }

        .search-container {
            padding: 20px;
            text-align: center;
        }

        .search-box {
            max-width: 600px;
            margin: 0 auto;
        }

        #searchInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #4a90e2;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            outline: none;
            border-color: #4d19cc;
            box-shadow: 0 0 15px rgba(77, 25, 204, 0.6);
        }

        .info-text {
            margin-top: 10px;
            font-size: 13px;
            color: #aaa;
        }

        /* КОНТЕЙНЕР КАРТЫ */
        .campus-map {
            position: relative;
            width: 90%;
            max-width: 1400px;
            height: 700px;
            margin: 20px auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        /* СТИЛИ ДЛЯ КОРПУСОВ */
        .building {
            position: absolute;  /* Абсолютное позиционирование - корпус может быть где угодно */
            display: flex;
            align-items: center;
            justify-content: center;
            background: #696969;  /* Серый цвет корпуса */
            color: #c1c1c1;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            z-index: 1;
            user-select: none;
        }

         /* НОВЫЙ КЛАСС ДЛЯ ТЕКСТА */
        .building-text {
            color: #c1c1c1;
            font-weight: bold;
            font-size: 14px;
            user-select: none;
            /* Позиционируем текст внутри корпуса */
            position: absolute;
        }

        /* Когда наводишь мышку на корпус */
        .building:hover {
            transform: scale(1.05);
            border: 3px solid #4d19cc;
            background: rgba(77, 25, 204, 0.3);
            z-index: 10;
        }

        /* Когда корпус найден в поиске - подсвечиваем */
        .building.highlighted {
            border: 4px solid #4d19cc;
            background: rgba(77, 25, 204, 0.5);
            z-index: 100;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Анимация пульса для подсветки */
        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(77, 25, 204, 0.6);
            }
            50% {
                box-shadow: 0 0 40px rgba(77, 25, 204, 1);
            }
        }
    </style>
</head>
<body>
    <!-- ЗАГОЛОВОК -->
    <div class="header">
        <h1>{{ page_title }}</h1>
    </div>

    <!-- ПОИСК -->
    <div class="search-container">
        <div class="search-box">
            <input
                type="text"
                id="searchInput"
                placeholder="Введите номер корпуса (1, 2, 3, 4, 5, 6, 7, 8, 9)"
                autocomplete="off"
            >
            <div class="info-text">Введите номер или нажмите на корпус</div>
        </div>
    </div>

    <!-- КАРТА КОРПУСОВ -->
    <div class="campus-map">
        <!-- Генерируем корпуса из БД с помощью цикла -->
        {% for building in buildings %}
        <div
            class="building"
            data-building="{{ building.number }}"
            style="
                left: {{ building.position_left }};
                top: {{ building.position_top }};
                width: {{ building.width }};
                height: {{ building.height }};
                {% if building.clip_path %}clip-path: {{ building.clip_path }};{% endif %}
                {% if building.border_radius %}border-radius: {{ building.border_radius }};{% endif %}
            "
            title="Корпус {{ building.number }}"
        >


            <div
            class="building-text"
            style="
                {% if building.text_padding_top %}top: {{ building.text_padding_top }};{% endif %}
                {% if building.text_padding_left %}left: {{ building.text_padding_left }};{% endif %}
            "
        >

            {{ building.number }}
        </div>
        </div>
        {% endfor %}
    </div>

    <!-- JAVASCRIPT для поиска и подсветки -->
    <script>
        const searchInput = document.getElementById('searchInput');
        const buildings = document.querySelectorAll('.building');

        // Поиск при вводе в поле
        searchInput.addEventListener('input', function(e) {
            const query = e.target.value.trim();

            // Очищаем подсветку со всех корпусов
            buildings.forEach(building => {
                building.classList.remove('highlighted');
            });

            // Если пользователь что-то написал
            if (query.length > 0) {
                // Извлекаем число из строки (например "3 корпус" → "3")
                const match = query.match(/\d+/);

                if (match) {
                    const buildingNumber = match[0];
                    // Ищем корпус с этим номером
                    const building = document.querySelector(`[data-building="${buildingNumber}"]`);

                    if (building) {
                        // Подсвечиваем найденный корпус
                        building.classList.add('highlighted');
                        // Плавная прокрутка к нему
                        building.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            }
        });

        // Клик по корпусу - заполняет поле поиска
        buildings.forEach(building => {
            building.addEventListener('click', function() {
                const number = this.getAttribute('data-building');
                searchInput.value = number;

                // Очищаем подсветку со всех
                buildings.forEach(b => {
                    b.classList.remove('highlighted');
                });

                // Подсвечиваем кликнутый корпус
                this.classList.add('highlighted');
            });
        });
    </script>
</body>
</html>
