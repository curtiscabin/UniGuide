{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/logosign.svg' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Golos Text', sans-serif;
            background-color: #4d19cc;
            color: #f1f1f1;
            min-height: 100vh;
        }

        .header {
            padding: 20px;
            text-align: center;
            font-size: 30px;
            font-weight: 400;
            background: rgba(0, 0, 0, 0.2);
        }

        .header-logo {
            height: 50px;
            width: auto;
            vertical-align: middle;
        }

        .search-container {
            padding: 20px;
            text-align: left;
            margin-left: 20px;
        }

        .search-box {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            color: #e8e8e8;
        }

        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        #searchInput {
            width: 100%;
            padding: 15px 50px 15px 20px;
            font-size: 16px;
            font-family: 'Golos Text', sans-serif;
            color: #e8e8e8;
            background-color: #696969;
            border-radius: 8px;
            border: 2px solid #2a1468;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            font-family: 'Golos Text', sans-serif;
            background-color: #4f4f4f;
            border-color: #6a35e0;
            outline: none;
        }

        #searchInput:hover {
            font-family: 'Golos Text', sans-serif;
            background-color: #4f4f4f;
            border-color: #6a35e0;
        }

        #searchInput::placeholder {
            font-family: 'Golos Text', sans-serif;
            color: #C1C1C1;
        }

        #searchInput:-webkit-autofill,
        #searchInput:-webkit-autofill:hover,
        #searchInput:-webkit-autofill:focus,
        #searchInput:-webkit-autofill:active {
            -webkit-text-fill-color: #ffffff !important;
            background-color: #2c2c2c !important;
            border: 2px solid #6a35e0 !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        #searchButton {
            position: absolute;
            right: 12px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        #searchButton:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        #searchButton:active {
            transform: scale(0.95);
        }

        .campus-map {
            position: relative;
            width: 90%;
            max-width: 1400px;
            height: 700px;
            margin: 20px auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .building-link {
            position: absolute;
            text-decoration: none;
        }

        .building {
            position: absolute;
            align-items: center;
            justify-content: center;
            background: #696969;
            color: #c1c1c1;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .building:hover {
            transform: scale(1.01);
            background: rgba(77, 25, 204, 0.2);
            border: 3px solid #4d19cc;
            z-index: 10;
        }

        .building.highlighted {
            border: 4px solid #4d19cc;
            background: rgba(77, 25, 204, 0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%,100% { box-shadow: 0 0 15px rgba(77,25,204,0.6); }
            50% { box-shadow: 0 0 30px rgba(77,25,204,1); }
        }

        .building-text {
            position: absolute;
            color: #c1c1c1;
            user-select: none;
        }

        #searchResults {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
            z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            max-height: 240px;
            overflow-y: auto;
            margin-top: 4px;
        }

        #searchResults div {
            padding: 12px 15px;
            border-bottom: 1px solid #3d3d3d;
            cursor: pointer;
            color: #e0e0e0;
            transition: background 0.2s ease;
        }

        #searchResults div:hover {
            background: #3d3d3d;
            color: #ffffff;
        }
        #clearButton {
            position: absolute;
            right: 52px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.3s ease;
            opacity: 0.7;
        }

        #clearButton:hover {
            background: rgba(255, 255, 255, 0.1);
            opacity: 1;
            transform: scale(1.05);
        }

        #clearButton:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>

<div class="header">
    <img src="{% static 'images/logosign-white.svg' %}" class="header-logo"> {{ page_title }}
</div>

<div class="search-container">
    <div class="search-box">
        <div class="search-input-wrapper">
                <input id="searchInput" type="text" placeholder="Поиск аудитории..." autocomplete="off">
                <button id="clearButton" style="
                    position: absolute;
                    right: 52px;
                    background: transparent;
                    border: none;
                    cursor: pointer;
                    padding: 8px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    border-radius: 6px;
                    transition: all 0.3s ease;
                    opacity: 0.7;
                ">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12L19 6.41Z" fill="#C1C1C1"/>
                    </svg>
                </button>
                <button id="searchButton">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15.5 14H14.71L14.43 13.73C15.41 12.59 16 11.11 16 9.5C16 5.91 13.09 3 9.5 3C5.91 3 3 5.91 3 9.5C3 13.09 5.91 16 9.5 16C11.11 16 12.59 15.41 13.73 14.43L14 14.71V15.5L19 20.49L20.49 19L15.5 14ZM9.5 14C7.01 14 5 11.99 5 9.5C5 7.01 7.01 5 9.5 5C11.99 5 14 7.01 14 9.5C14 11.99 11.99 14 9.5 14Z" fill="#C1C1C1"/>
                    </svg>
                </button>
            </div>
        <div id="searchResults"></div>
    </div>
</div>

<div class="campus-map">
    {% for building in buildings %}
    <a href="{% url 'building' building.number %}"
       class="building-link"
       data-building="{{ building.number }}"
       style="
            left: {{ building.position_left }};
            top: {{ building.position_top }};
            width: {{ building.width }};
            height: {{ building.height }};
       "
    >
        <div class="building"
             style="
                width: 100%;
                height: 100%;
                {% if building.clip_path %}clip-path: {{ building.clip_path }};{% endif %}
                {% if building.border_radius %}border-radius: {{ building.border_radius }};{% endif %}
                {% if building.z_index %}z-index: {{ building.z_index }};{% endif %}
             "
        >
            <div class="building-text"
                 style="
                    {% if building.text_padding_top %}top: {{ building.text_padding_top }};{% endif %}
                    {% if building.text_padding_left %}left: {{ building.text_padding_left }};{% endif %}
                 "
            >
                {{ building.number }}
            </div>
        </div>
    </a>
    {% endfor %}
</div>

<!-- ПОДКЛЮЧАЕМ JS ФАЙЛ -->
    <script src="{% static 'js/search.js' %}"></script>

</body>
</html>
