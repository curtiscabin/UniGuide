<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #4d19cc;
            color: #f1f1f1;
            min-height: 100vh;
        }

        .header {
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .search-container {
            padding: 20px;
            text-align: center;
        }

        .search-box {
            max-width: 600px;
            margin: 0 auto;
        }

        #searchInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #4a90e2;
        }

        .info-text {
            margin-top: 10px;
            font-size: 13px;
            color: #aaa;
        }

        .campus-map {
            position: relative;
            width: 90%;
            max-width: 1400px;
            height: 700px;
            margin: 20px auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .building-link {
            position: absolute;
            text-decoration: none;
        }

        .building {
            position: absolute;
            align-items: center;
            justify-content: center;
            background: #696969;
            color: #c1c1c1;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .building:hover {
            transform: scale(1.05);
            background: rgba(77, 25, 204, 0.4);
            border: 3px solid #4d19cc;
            z-index: 10;
        }

        .building.highlighted {
            border: 4px solid #4d19cc;
            background: rgba(77, 25, 204, 0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%,100% { box-shadow: 0 0 15px rgba(77,25,204,0.6); }
            50% { box-shadow: 0 0 30px rgba(77,25,204,1); }
        }

        .building-text {
            position: absolute;
            color: #c1c1c1;
            user-select: none;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>{{ page_title }}</h1>
</div>

<div class="search-container">
    <div class="search-box">
        <input id="searchInput" type="text" placeholder="Введите номер корпуса">
        <div class="info-text">Введите номер или нажмите на корпус</div>
    </div>
</div>

<div class="campus-map">

{% for building in buildings %}
<a href="{% url 'building' building.number %}"
   class="building-link"
   data-building="{{ building.number }}"
   style="
        left: {{ building.position_left }};
        top: {{ building.position_top }};
        width: {{ building.width }};
        height: {{ building.height }};
   "
>
    <div class="building"
         style="
            width: 100%;
            height: 100%;
            {% if building.clip_path %}clip-path: {{ building.clip_path }};{% endif %}
            {% if building.border_radius %}border-radius: {{ building.border_radius }};{% endif %}
         "
    >
        <div class="building-text"
             style="
                {% if building.text_padding_top %}top: {{ building.text_padding_top }};{% endif %}
                {% if building.text_padding_left %}left: {{ building.text_padding_left }};{% endif %}
             "
        >
            {{ building.number }}
        </div>
    </div>
</a>
{% endfor %}

</div>

<script>
const searchInput = document.getElementById('searchInput');
const buildings = document.querySelectorAll('.building-link');

searchInput.addEventListener('input', function() {
    const value = this.value.trim();
    buildings.forEach(b => b.querySelector('.building').classList.remove('highlighted'));

    if (value) {
        const target = document.querySelector(`[data-building="${value}"]`);
        if (target) {
            target.querySelector('.building').classList.add('highlighted');
            target.scrollIntoView({behavior: 'smooth', block: 'center'});
        }
    }
});
</script>

</body>
</html>
