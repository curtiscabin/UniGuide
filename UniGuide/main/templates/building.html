{% extends 'base.html' %}

{% block title %}Корпус {{ building.number }}{% endblock %}

{% block content %}

<div style="display: flex; width: 100%;">

    <!-- БОКОВОЕ МЕНЮ ЭТАЖЕЙ -->
    <div style="
        width: 120px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-right: 20px;
    ">
        {% for floor in floors %}
            <a href="?floor={{ floor }}" style="
                padding: 10px;
                text-align: center;
                background: {% if floor == current_floor %}#4d19cc{% else %}#333{% endif %};
                color: white;
                text-decoration: none;
                border-radius: 8px;
            ">
                {{ floor }} этаж
            </a>
        {% endfor %}
    </div>

    <!-- САМ ЭТАЖ -->
    <div style="flex: 1;">
        {% include current_template %}
    </div>

</div>

{% endblock %}
